name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: playm8z
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Ephemeral CI-only Postgres (the services container above), not a
      # real secret.
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/playm8z
      # Placeholders sufficient for the app to boot in CI -- no real
      # Google OAuth flow or authenticated session is exercised by the
      # current test suite.
      AUTH_SECRET: ci-only-placeholder-secret-not-used-for-real-sessions
      AUTH_GOOGLE_ID: ci-placeholder-google-client-id
      AUTH_GOOGLE_SECRET: ci-placeholder-google-client-secret

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm run typecheck

      - run: npm run lint

      - name: Push Drizzle schema to the CI database
        run: npx drizzle-kit push --force

      - name: Unit/integration tests (Vitest)
        run: npm test

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: E2e tests (Playwright)
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
